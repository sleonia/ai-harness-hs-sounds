<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Divider Demo</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: #1a1a1a;
        color: #d4d4d4;
      }

      .titleContainer {
        padding: 0;
        margin: 0;
        list-style: none;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0;
      }

      .titleContent {
        padding: 0 30px;
        margin-top: -5px;
        min-width: fit-content;
      }

      .divider-icon {
        width: 120px;
        height: 48px;
        display: block;
      }

      .dark .divider-icon {
        opacity: 0.4;
      }

      h5 {
        margin: 0;
        color: #d4d4d4;
      }

      .demo-section {
        margin: 20px 0;
        text-align: center;
      }

      .demo-label {
        margin-bottom: 10px;
        color: #888;
        font-size: 12px;
      }
    </style>
  </head>

    <div>

            <h5>

                  Рыцарь смерти
