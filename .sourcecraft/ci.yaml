on:
  push:
    - workflows: [sourcecraft-gh-actions]
      filter:
        branches: ["main"]

workflows:
  sourcecraft-gh-actions:
    tasks:
      - name: run-github-actions-in-sourcecraft
        cubes:
          - name: checkout
            action: actions/checkout@v4

          - name: setup-buildx
            action: docker/setup-buildx-action@v3.11.1
